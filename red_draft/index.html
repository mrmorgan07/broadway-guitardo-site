
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broadway Guitardo — red_draft</title>
  <meta name="description" content="Broadway Guitardo — место, где музыка, сцена и атмосфера объединяются в полноценный опыт.">

  <!-- Резервная антиква (если DRUZHOK не загрузится) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/red_draft/style.css">
</head>
<body>

  <!-- ШАПКА -->
  <header class="header" id="header">
    <div class="header__inner">
      <a href="#hero" class="logo" id="logo">Broadway <b>Guitardo</b></a>
      <nav class="nav" id="nav">
        <a href="#about">О коллективе</a>
        <a href="#afisha">Афиша</a>
        <a href="#feature">Бал Вампиров</a>
        <a href="#gallery">Галерея</a>
        <a href="#invite">Присоединиться</a>
        <a href="#afisha" class="btn btn-primary">Билеты</a>
      </nav>
      <button class="burger" id="burger" aria-label="Меню"><span></span><span></span><span></span></button>
    </div>
  </header>

  <!-- Контент рендерится из /api/content -->
  <main id="app">
    <div class="boot-screen" id="bootScreen">Загрузка…</div>
  </main>

  <!-- ФУТЕР -->
  <footer class="footer" id="footer"></footer>

  <!-- МОДАЛКА ТРЕЙЛЕРА -->
  <div class="modal" id="trailerModal">
    <div class="modal__inner">
      <button class="modal__close" data-close-trailer aria-label="Закрыть">&times;</button>
      <div id="trailerBody"></div>
    </div>
  </div>

  <!-- МОДАЛКА СПЕКТАКЛЯ -->
  <div class="modal modal--project" id="projectModal">
    <div class="modal__panel">
      <button class="modal__close" data-close-project aria-label="Закрыть">&times;</button>
      <div id="projectBody"></div>
    </div>
  </div>

  <script src="/red_draft/script.js"></script>
</body>
</html>
