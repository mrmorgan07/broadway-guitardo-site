<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Админ-панель — Broadway Guitardo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>

  <!-- Вход -->
  <div id="loginScreen" class="login-wrap">
    <form id="loginForm" class="card login-card shadow">
      <div class="card-body p-4">
        <h1 class="h3 mb-1" style="font-family:var(--font-heading);color:var(--gold)">Админ-панель</h1>
        <p class="text-muted small mb-4">Broadway Guitardo</p>
        <div class="mb-3">
          <label class="form-label" for="loginUser">Логин</label>
          <input type="text" class="form-control" id="loginUser" value="admin" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label" for="loginPass">Пароль</label>
          <input type="password" class="form-control" id="loginPass" required autocomplete="current-password" placeholder="12345">
        </div>
        <button type="submit" class="btn btn-gold w-100">Войти</button>
        <div id="loginError" class="alert alert-danger mt-3 d-none" role="alert"></div>
        <a href="/" class="d-block text-center mt-3 small text-muted">← На сайт</a>
      </div>
    </form>
  </div>

  <!-- Приложение -->
  <div id="adminApp" class="d-none">
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastWrap"></div>

    <div class="d-flex">
      <nav class="admin-sidebar flex-shrink-0 p-3">
        <a href="/" class="d-flex align-items-center mb-3 text-decoration-none">
          <span class="fs-5" style="font-family:var(--font-heading);color:var(--gold)">CMS</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column gap-1" id="sideNav">
          <li><button class="nav-link active" data-view="dashboard">📊 Дашборд</button></li>
          <li><button class="nav-link" data-view="projects">🎭 Спектакли</button></li>
          <li><button class="nav-link" data-view="hero">🎬 Главный экран</button></li>
          <li><button class="nav-link" data-view="about">📖 О нас</button></li>
          <li><button class="nav-link" data-view="director">👤 Худрук</button></li>
          <li><button class="nav-link" data-view="concertmaster">🎹 Концертмейстер</button></li>
          <li><button class="nav-link" data-view="choir">🎤 В хор</button></li>
          <li><button class="nav-link" data-view="contacts">📞 Контакты</button></li>
          <li><button class="nav-link" data-view="location">📍 Как добраться</button></li>
          <li><button class="nav-link" data-view="media">🖼️ Медиатека</button></li>
          <li><button class="nav-link" data-view="password">🔒 Смена пароля</button></li>
        </ul>
        <hr>
        <button class="btn btn-outline-secondary btn-sm w-100" id="logoutBtn">Выйти</button>
      </nav>

      <main class="admin-content flex-grow-1 p-4">
        <div id="viewDashboard" class="admin-view"></div>
        <div id="viewProjects" class="admin-view d-none"></div>
        <div id="viewProjectEdit" class="admin-view d-none"></div>
        <div id="viewHero" class="admin-view d-none"></div>
        <div id="viewAbout" class="admin-view d-none"></div>
        <div id="viewDirector" class="admin-view d-none"></div>
        <div id="viewConcertmaster" class="admin-view d-none"></div>
        <div id="viewChoir" class="admin-view d-none"></div>
        <div id="viewContacts" class="admin-view d-none"></div>
        <div id="viewLocation" class="admin-view d-none"></div>
        <div id="viewMedia" class="admin-view d-none"></div>
        <div id="viewPassword" class="admin-view d-none"></div>
      </main>
    </div>
  </div>

  <!-- Модалка подтверждения удаления -->
  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Подтверждение</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="confirmText">Вы уверены?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
          <button type="button" class="btn btn-danger" id="confirmOk">Удалить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
