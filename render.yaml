services:
  - type: web
    name: broadway-guitardo
    runtime: node
    region: frankfurt          # ближайший к России регион на Render
    plan: free

    buildCommand: npm run render-build
    startCommand: npm start

    # Render автоматически выставляет PORT — сервер его читает через process.env.PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"         # Разрешает установку devDependencies (нужно для vite)
      - key: SESSION_SECRET
        generateValue: true    # Render сгенерирует случайную строку автоматически
      # ADMIN_PASSWORD задайте вручную в дашборде Render (не храните в git!)
      # - key: ADMIN_PASSWORD
      #   value: YOUR_SECURE_PASSWORD_HERE

      # База данных Turso (libSQL). Введите оба значения вручную в дашборде Render.
      # Без них данные лягут в эфемерный файл и сбросятся при редеплое.
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false

    # Авто-деплой при пуше в ветку main/master
    autoDeploy: true

    # healthCheckPath: /          # можно раскомментировать если нужен health-check
